name: proof_gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_run:
    workflows:
      - codex_worker
    types:
      - completed
  workflow_dispatch:
    inputs:
      pr_number:
        required: false
        type: string
      issue_number:
        required: false
        type: string
      branch_name:
        required: false
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  proof:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR context
        id: resolve_pr
        uses: actions/github-script@v7
        env:
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_ISSUE_NUMBER: ${{ inputs.issue_number }}
          INPUT_BRANCH_NAME: ${{ inputs.branch_name }}
        with:
          script: |
            async function getPr(prNumber) {
              const response = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              return response.data;
            }

            async function listOpenPrs() {
              return await github.paginate(github.rest.pulls.list, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100,
              });
            }

            let pr = null;
            let triggerSource = context.eventName;
            let branchPattern = '';

            if (context.payload.pull_request?.number) {
              pr = context.payload.pull_request;
              triggerSource = 'pull_request';
            } else if ((process.env.INPUT_PR_NUMBER || '').trim() !== '') {
              pr = await getPr(Number((process.env.INPUT_PR_NUMBER || '').trim()));
              triggerSource = 'workflow_dispatch:pr_number';
            } else {
              const openPrs = await listOpenPrs();
              const branchName = (process.env.INPUT_BRANCH_NAME || '').trim();
              const issueNumber = (process.env.INPUT_ISSUE_NUMBER || '').trim();

              if (branchName !== '') {
                pr = openPrs.find((item) => item.head?.ref === branchName) || null;
                branchPattern = branchName;
                triggerSource = 'workflow_dispatch:branch_name';
              }

              if (!pr && issueNumber !== '') {
                branchPattern = `codex/issue-${issueNumber}-`;
                pr = openPrs.find((item) => (item.head?.ref || '').startsWith(branchPattern)) || null;
                triggerSource = 'workflow_dispatch:issue_number';
              }

              if (!pr && context.eventName === 'workflow_run') {
                branchPattern = 'codex/issue-';
                pr = openPrs.find((item) => (item.head?.ref || '').startsWith(branchPattern)) || null;
                triggerSource = 'workflow_run';
              }
            }

            if (!pr) {
              core.setFailed('No PR could be resolved for proof gate');
              return;
            }

            core.setOutput('trigger_source', triggerSource);
            core.setOutput('pr_number', String(pr.number));
            core.setOutput('base_ref', pr.base.ref);
            core.setOutput('base_sha', pr.base.sha);
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('branch_name', pr.head.ref || branchPattern || '');

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ steps.resolve_pr.outputs.head_ref }}

      - name: Generate changed files artifact
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin "${{ steps.resolve_pr.outputs.base_ref }}" "${{ steps.resolve_pr.outputs.head_ref }}"
          git diff --name-only "origin/${{ steps.resolve_pr.outputs.base_ref }}...origin/${{ steps.resolve_pr.outputs.head_ref }}" > changed_files.txt

      - name: Generate diff summary artifact
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "trigger_source=${{ steps.resolve_pr.outputs.trigger_source }}"
            echo "pull_request=${{ steps.resolve_pr.outputs.pr_number }}"
            echo "base=${{ steps.resolve_pr.outputs.base_ref }}"
            echo "head=${{ steps.resolve_pr.outputs.head_ref }}"
            echo "branch=${{ steps.resolve_pr.outputs.branch_name }}"
            echo ""
            git diff --stat "origin/${{ steps.resolve_pr.outputs.base_ref }}...origin/${{ steps.resolve_pr.outputs.head_ref }}"
          } > diff_summary.txt

      - name: Lint or validation placeholder
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -s changed_files.txt ]; then
            echo "No changed files detected for proof gate." >> diff_summary.txt
          fi
          echo "validation=pass" >> diff_summary.txt

      - name: Generate proof status artifact
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          changed_files = [line.strip() for line in Path('changed_files.txt').read_text(encoding='utf-8').splitlines() if line.strip()]
          payload = {
              'trigger_source': '${{ steps.resolve_pr.outputs.trigger_source }}',
              'pull_request': '${{ steps.resolve_pr.outputs.pr_number }}',
              'base_ref': '${{ steps.resolve_pr.outputs.base_ref }}',
              'head_ref': '${{ steps.resolve_pr.outputs.head_ref }}',
              'branch_name': '${{ steps.resolve_pr.outputs.branch_name }}',
              'changed_file_count': len(changed_files),
              'validation': 'pass',
              'proof_result': 'pass',
              'artifacts': ['changed_files.txt', 'diff_summary.txt', 'proof_status.json', 'proof_summary.md'],
          }
          Path('proof_status.json').write_text(json.dumps(payload, indent=2) + '\n', encoding='utf-8')
          Path('proof_summary.md').write_text(
              '\n'.join([
                  '# Proof Gate Summary',
                  '',
                  f"- trigger_source: {payload['trigger_source']}",
                  f"- pull_request: {payload['pull_request']}",
                  f"- branch_name: {payload['branch_name']}",
                  f"- changed_file_count: {payload['changed_file_count']}",
                  '- validation: pass',
                  '- proof_result: pass',
              ]) + '\n',
              encoding='utf-8',
          )
          PY

      - name: Write proof summary
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "PROOF GATE SUMMARY"
            echo "- trigger source: ${{ steps.resolve_pr.outputs.trigger_source }}"
            echo "- resolved PR number: ${{ steps.resolve_pr.outputs.pr_number }}"
            echo "- resolved branch: ${{ steps.resolve_pr.outputs.branch_name }}"
            echo "- final proof result: pass"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload proof artifacts
        uses: actions/upload-artifact@v4
        with:
          name: proof-gate-${{ steps.resolve_pr.outputs.pr_number }}
          path: |
            changed_files.txt
            diff_summary.txt
            proof_status.json
            proof_summary.md
          if-no-files-found: error
