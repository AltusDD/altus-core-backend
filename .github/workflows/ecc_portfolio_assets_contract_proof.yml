name: ecc_portfolio_assets_contract_proof

on:
  pull_request:
    paths:
      - "tests/contracts/test_ecc_portfolio_assets_contract.py"
      - "docs/contracts/ECC_PORTFOLIO_ASSETS_CONTRACT_V1.md"
      - "docs/contracts/fixtures/ecc_portfolio_assets/**"
      - "azure/functions/asset_ingest/ecc_portfolio_assets_handler.py"
      - "azure/functions/asset_ingest/ecc_portfolio_assets_service.py"
      - ".github/workflows/ecc_portfolio_assets_contract_proof.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ecc-portfolio-assets-contract-proof:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run ECC portfolio assets contract proof
        shell: bash
        run: |
          set -euo pipefail
          python -m unittest discover -s tests/contracts -p 'test_ecc_portfolio_assets_contract.py' -v

      - name: Write contract proof summary
        shell: bash
        run: |
          {
            echo "ECC PORTFOLIO ASSETS CONTRACT PROOF"
            echo "- test module: tests/contracts/test_ecc_portfolio_assets_contract.py"
            echo "- result: pass"
            echo "- scope: GET /api/ecc/portfolio/assets"
          } >> "$GITHUB_STEP_SUMMARY"
