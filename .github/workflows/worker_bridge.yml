name: worker_bridge

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: target issue number
        required: true
        type: string
      action_mode:
        description: claim or result
        required: true
        type: choice
        options:
          - claim
          - result
      dry_run:
        description: dry-run mode
        required: true
        default: false
        type: boolean
      outcome:
        description: result outcome
        required: false
        default: success
        type: choice
        options:
          - success
          - blocked
          - failed
          - proof-ready
      summary:
        description: result summary
        required: false
        default: ""
        type: string
      changed_files:
        description: changed files (newline or comma separated)
        required: false
        default: ""
        type: string
      commit_sha:
        description: commit SHA
        required: false
        default: ""
        type: string
      pr_url:
        description: PR URL
        required: false
        default: ""
        type: string
      proof_artifacts:
        description: proof artifacts (newline or comma separated)
        required: false
        default: ""
        type: string
      blocker_reason:
        description: blocker reason
        required: false
        default: ""
        type: string
      next_required_action:
        description: next required action
        required: false
        default: ""
        type: string

permissions:
  contents: read
  issues: write

jobs:
  bridge:
    runs-on: ubuntu-latest
    steps:
      - name: Execute claim/result bridge
        uses: actions/github-script@v7
        env:
          INPUT_ISSUE_NUMBER: ${{ inputs.issue_number }}
          INPUT_ACTION_MODE: ${{ inputs.action_mode }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          INPUT_OUTCOME: ${{ inputs.outcome }}
          INPUT_SUMMARY: ${{ inputs.summary }}
          INPUT_CHANGED_FILES: ${{ inputs.changed_files }}
          INPUT_COMMIT_SHA: ${{ inputs.commit_sha }}
          INPUT_PR_URL: ${{ inputs.pr_url }}
          INPUT_PROOF_ARTIFACTS: ${{ inputs.proof_artifacts }}
          INPUT_BLOCKER_REASON: ${{ inputs.blocker_reason }}
          INPUT_NEXT_REQUIRED_ACTION: ${{ inputs.next_required_action }}
        with:
          script: |
            const fs = require('fs');

            const STATUS_LABELS = [
              'status:queued',
              'status:running',
              'status:blocked',
              'status:proof-ready',
              'status:closed'
            ];

            function section(markdown, key) {
              if (!markdown) return '';
              const re = new RegExp(`###\\s+${key}\\s*\\n+([\\s\\S]*?)(?=\\n###\\s+|$)`, 'i');
              const match = markdown.match(re);
              return match ? match[1].trim() : '';
            }

            function normalizeList(value) {
              return (value || '')
                .split(/\r?\n|,/)
                .map(item => item.trim())
                .filter(Boolean);
            }

            function packetToText(packet) {
              return [
                `issue_number=${packet.issue_number}`,
                `issue_title=${packet.issue_title}`,
                `lane=${packet.lane}`,
                `task_type=${packet.task_type}`,
                `objective=${packet.objective}`,
                `target_files=${packet.target_files}`,
                `acceptance_criteria=${packet.acceptance_criteria}`,
                `proof_required=${packet.proof_required}`,
                `environment=${packet.environment}`,
                `priority=${packet.priority}`,
                `execution_agent=${packet.execution_agent}`,
                `repo=${packet.repo}`,
                `branch=${packet.branch}`,
                `expected_proofpack=${packet.expected_proofpack}`,
                `execution_mode=${packet.execution_mode}`,
                `current_labels=${packet.current_labels.join(',')}`,
                `requested_by=${packet.requested_by}`,
                `commit_branch=${packet.commit_branch}`,
                `expected_result_mode=${packet.expected_result_mode}`,
                `proofpack_expectation=${packet.proofpack_expectation}`
              ].join('\n');
            }

            function resultToText(result) {
              return [
                `issue_number=${result.issue_number}`,
                `outcome=${result.outcome}`,
                `summary=${result.summary}`,
                `changed_files=${result.changed_files.join(',')}`,
                `commit_sha=${result.commit_sha}`,
                `pr_url=${result.pr_url}`,
                `proof_artifacts=${result.proof_artifacts.join(',')}`,
                `blocker_reason=${result.blocker_reason}`,
                `next_required_action=${result.next_required_action}`
              ].join('\n');
            }

            async function listIssueLabels(issueNumber) {
              const response = await github.rest.issues.listLabelsOnIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber
              });
              return response.data.map(label => label.name);
            }

            async function setSingleStatus(issueNumber, nextStatus) {
              const current = await listIssueLabels(issueNumber);
              for (const name of current) {
                if (STATUS_LABELS.includes(name) && name !== nextStatus) {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    name
                  }).catch(() => {});
                }
              }
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: [nextStatus]
              });
            }

            const issueNumber = context.eventName === 'issues'
              ? context.payload.issue.number
              : Number((process.env.INPUT_ISSUE_NUMBER || '').trim());

            if (!issueNumber || Number.isNaN(issueNumber)) {
              core.setFailed('issue_number must be numeric');
              return;
            }

            const actionMode = context.eventName === 'issues'
              ? 'claim'
              : (process.env.INPUT_ACTION_MODE || '').trim().toLowerCase();

            if (!['claim', 'result'].includes(actionMode)) {
              core.setFailed('action_mode must be claim or result');
              return;
            }

            const dryRun = (String(process.env.INPUT_DRY_RUN || 'false').toLowerCase() === 'true');
            const outcome = (process.env.INPUT_OUTCOME || 'success').trim().toLowerCase();
            const dateStamp = new Date().toISOString().slice(0, 10);

            if (!['success', 'blocked', 'failed', 'proof-ready'].includes(outcome)) {
              core.setFailed('outcome must be success|blocked|failed|proof-ready');
              return;
            }

            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });

            const issueBody = issue.data.body || '';
            const currentLabels = issue.data.labels.map(label => label.name);
            const laneLabels = currentLabels.filter(name => name.startsWith('lane:'));
            const agentLabels = currentLabels.filter(name => name.startsWith('agent:'));
            const statusLabels = currentLabels.filter(name => STATUS_LABELS.includes(name));

            const executionAgent = section(issueBody, 'execution_agent');
            const noLiveWorker = executionAgent === 'none' || agentLabels.includes('agent:none');
            const lane = laneLabels[0] || '';
            const executionMode = lane === 'lane:be-core' ? 'direct' : 'relay-fallback';
            const honestyNote = noLiveWorker
              ? 'No live worker exists for execution_agent=none; bridge emits truthful packet/result records only.'
              : (dryRun ? 'Dry-run enabled; bridge emitted records without performing code execution.' : 'Live worker path expected.');

            if (actionMode === 'claim') {
              if (laneLabels.length !== 1) {
                core.setFailed(`claim requires exactly one lane:* label; found ${laneLabels.length}`);
                return;
              }
              if (agentLabels.length !== 1) {
                core.setFailed(`claim requires exactly one agent:* label; found ${agentLabels.length}`);
                return;
              }
              if (!(statusLabels.includes('status:queued') || statusLabels.includes('status:blocked'))) {
                core.setFailed('claim requires current status:queued or status:blocked');
                return;
              }

              await setSingleStatus(issueNumber, 'status:running');
              const labelsAfterStatus = await listIssueLabels(issueNumber);

              const packet = {
                issue_number: issueNumber,
                issue_title: issue.data.title,
                lane,
                task_type: section(issueBody, 'task_type'),
                objective: section(issueBody, 'objective'),
                target_files: section(issueBody, 'target_files'),
                acceptance_criteria: section(issueBody, 'acceptance_criteria'),
                proof_required: section(issueBody, 'proof_required'),
                environment: section(issueBody, 'environment'),
                priority: section(issueBody, 'priority'),
                execution_agent: executionAgent,
                repo: `${context.repo.owner}/${context.repo.repo}`,
                branch: process.env.GITHUB_REF_NAME || '',
                expected_proofpack: `docs/proofpacks/${dateStamp}_be-core_issue-${issueNumber}`,
                execution_mode: executionMode,
                current_labels: labelsAfterStatus,
                requested_by: issue.data.user?.login || '',
                commit_branch: process.env.GITHUB_REF_NAME || '',
                expected_result_mode: 'result',
                proofpack_expectation: `docs/proofpacks/${dateStamp}_be-core_issue-${issueNumber}`,
                dry_run: dryRun,
                honesty_note: honestyNote
              };

              fs.writeFileSync('worker_packet.json', JSON.stringify(packet, null, 2));
              fs.writeFileSync('worker_packet.txt', packetToText(packet) + '\n');

              const packetComment = [
                '<!-- autonomy-worker-packet -->',
                '## Worker Packet',
                `issue_number: ${packet.issue_number}`,
                `issue_title: ${packet.issue_title}`,
                `lane: ${packet.lane}`,
                `task_type: ${packet.task_type}`,
                `objective: ${packet.objective}`,
                `target_files: ${packet.target_files}`,
                `acceptance_criteria: ${packet.acceptance_criteria}`,
                `proof_required: ${packet.proof_required}`,
                `environment: ${packet.environment}`,
                `priority: ${packet.priority}`,
                `execution_agent: ${packet.execution_agent}`,
                `repo: ${packet.repo}`,
                `branch: ${packet.branch}`,
                `expected_proofpack: ${packet.expected_proofpack}`,
                `execution_mode: ${packet.execution_mode}`,
                `current_labels: ${packet.current_labels.join(', ')}`,
                `requested_by: ${packet.requested_by}`,
                `commit_branch: ${packet.commit_branch}`,
                `expected_result_mode: ${packet.expected_result_mode}`,
                `proofpack_expectation: ${packet.proofpack_expectation}`,
                `dry_run: ${packet.dry_run}`,
                `honesty_note: ${packet.honesty_note}`
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: packetComment
              });
              return;
            }

            const mappedStatus = {
              success: 'status:proof-ready',
              'proof-ready': 'status:proof-ready',
              blocked: 'status:blocked',
              failed: 'status:blocked'
            }[outcome];

            await setSingleStatus(issueNumber, mappedStatus);

            const result = {
              issue_number: issueNumber,
              outcome,
              summary: (process.env.INPUT_SUMMARY || '').trim(),
              changed_files: normalizeList(process.env.INPUT_CHANGED_FILES || ''),
              commit_sha: (process.env.INPUT_COMMIT_SHA || '').trim(),
              pr_url: (process.env.INPUT_PR_URL || '').trim(),
              proof_artifacts: normalizeList(process.env.INPUT_PROOF_ARTIFACTS || ''),
              blocker_reason: (process.env.INPUT_BLOCKER_REASON || '').trim(),
              next_required_action: (process.env.INPUT_NEXT_REQUIRED_ACTION || '').trim(),
              execution_mode: executionMode,
              dry_run: dryRun,
              honesty_note: honestyNote
            };

            fs.writeFileSync('worker_result.json', JSON.stringify(result, null, 2));
            fs.writeFileSync('worker_result.txt', resultToText(result) + '\n');

            const handoff = {
              issue_number: issueNumber,
              outcome: result.outcome,
              summary: result.summary,
              changed_files: result.changed_files,
              commit_sha: result.commit_sha,
              pr_url: result.pr_url,
              proof_artifacts: result.proof_artifacts,
              blocker_reason: result.blocker_reason,
              next_required_action: result.next_required_action,
              execution_mode: result.execution_mode,
              dry_run: result.dry_run,
              honesty_note: result.honesty_note
            };

            fs.writeFileSync('worker_handoff.txt', JSON.stringify(handoff, null, 2) + '\n');

            const resultComment = [
              '<!-- autonomy-worker-result -->',
              '## Worker Result',
              `issue_number: ${result.issue_number}`,
              `outcome: ${result.outcome}`,
              `summary: ${result.summary}`,
              `changed_files: ${result.changed_files.join(', ')}`,
              `commit_sha: ${result.commit_sha}`,
              `pr_url: ${result.pr_url}`,
              `proof_artifacts: ${result.proof_artifacts.join(', ')}`,
              `blocker_reason: ${result.blocker_reason}`,
              `next_required_action: ${result.next_required_action}`,
              `execution_mode: ${result.execution_mode}`,
              `dry_run: ${result.dry_run}`,
              `honesty_note: ${result.honesty_note}`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: resultComment
            });

            const shouldPostHandoff = result.commit_sha || result.pr_url || result.changed_files.length > 0 || result.proof_artifacts.length > 0;
            if (shouldPostHandoff) {
              const handoffComment = [
                '<!-- autonomy-pr-handoff -->',
                '## PR / Commit Handoff',
                `issue_number: ${handoff.issue_number}`,
                `outcome: ${handoff.outcome}`,
                `summary: ${handoff.summary}`,
                `changed_files: ${handoff.changed_files.join(', ')}`,
                `commit_sha: ${handoff.commit_sha}`,
                `pr_url: ${handoff.pr_url}`,
                `proof_artifacts: ${handoff.proof_artifacts.join(', ')}`,
                `blocker_reason: ${handoff.blocker_reason}`,
                `next_required_action: ${handoff.next_required_action}`,
                `execution_mode: ${handoff.execution_mode}`,
                `dry_run: ${handoff.dry_run}`,
                `honesty_note: ${handoff.honesty_note}`
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: handoffComment
              });
            }

      - name: Upload worker bridge artifacts
        uses: actions/upload-artifact@v4
        with:
          name: worker-bridge-${{ github.run_id }}
          path: |
            worker_packet.json
            worker_packet.txt
            worker_result.json
            worker_result.txt
            worker_handoff.txt
          if-no-files-found: error
