name: price_engine_proof_gate

on:
  pull_request:
    paths:
      - "tests/contracts/test_price_engine_calculate_contract.py"
      - "tests/contracts/test_price_engine_contract_proof_integrity.py"
      - "tests/contracts/test_price_engine_calculations_preview_contract.py"
      - "tests/contracts/test_price_engine_calculations_preview_contract_proof_integrity.py"
      - "tests/contracts/test_title_rate_quote_contract.py"
      - "tests/contracts/test_title_rate_quote_contract_proof_integrity.py"
      - "tests/contracts/test_price_engine_route_inventory_proof.py"
      - "tests/contracts/test_price_engine_route_inventory_proof_integrity.py"
      - "tests/contracts/test_price_engine_contract_artifact_integrity.py"
      - "tests/contracts/test_price_engine_frontend_entrypoint_integrity.py"
      - "tests/contracts/test_price_engine_contracts_readme_integrity.py"
      - "tests/contracts/test_price_engine_proof_gate_integrity.py"
      - "docs/contracts/README.md"
      - "docs/contracts/PRICE_ENGINE_CALCULATE_CONTRACT_V1.md"
      - "docs/contracts/PRICE_ENGINE_CALCULATIONS_PREVIEW_CONTRACT_V1.md"
      - "docs/contracts/TITLE_RATE_PROVIDER_ADAPTER_CONTRACT_V1.md"
      - "docs/contracts/PRICE_ENGINE_CONTRACT_COVERAGE_INDEX_V1.md"
      - "docs/contracts/PRICE_ENGINE_FRONTEND_ENTRYPOINT_V1.md"
      - "docs/contracts/fixtures/price_engine_calculate/**"
      - "docs/contracts/fixtures/price_engine_calculations_preview/**"
      - "docs/contracts/fixtures/title_rate_quote/**"
      - "docs/architecture/ROUTE_MAP_V1.md"
      - "azure/functions/asset_ingest/function_app.py"
      - "azure/functions/asset_ingest/price_engine_handler.py"
      - "azure/functions/asset_ingest/price_engine_service.py"
      - "azure/functions/asset_ingest/price_engine_calculations_preview_handler.py"
      - "azure/functions/asset_ingest/price_engine_calculations.py"
      - "azure/functions/asset_ingest/title_rate_handler.py"
      - "azure/functions/asset_ingest/title_rate_provider.py"
      - ".github/workflows/price_engine_contract_proof.yml"
      - ".github/workflows/price_engine_contract_proof_integrity.yml"
      - ".github/workflows/price_engine_calculations_preview_contract_proof.yml"
      - ".github/workflows/price_engine_calculations_preview_contract_proof_integrity.yml"
      - ".github/workflows/title_rate_quote_contract_proof.yml"
      - ".github/workflows/title_rate_quote_contract_proof_integrity.yml"
      - ".github/workflows/price_engine_route_inventory_proof.yml"
      - ".github/workflows/price_engine_route_inventory_proof_integrity.yml"
      - ".github/workflows/price_engine_contract_artifact_integrity.yml"
      - ".github/workflows/price_engine_frontend_entrypoint_integrity.yml"
      - ".github/workflows/price_engine_contracts_readme_integrity.yml"
      - ".github/workflows/price_engine_proof_gate_integrity.yml"
      - ".github/workflows/price_engine_proof_gate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  price-engine-proof-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run price engine proof gate
        shell: bash
        run: |
          set -euo pipefail
          python -m unittest discover -s tests/contracts -p 'test_price_engine_calculate_contract.py' -v
          python -m unittest discover -s tests/contracts -p 'test_price_engine_contract_proof_integrity.py' -v
          python -m unittest discover -s tests/contracts -p 'test_price_engine_calculations_preview_contract.py' -v
          python -m unittest discover -s tests/contracts -p 'test_price_engine_calculations_preview_contract_proof_integrity.py' -v
          python -m unittest discover -s tests/contracts -p 'test_title_rate_quote_contract.py' -v
          python -m unittest discover -s tests/contracts -p 'test_title_rate_quote_contract_proof_integrity.py' -v
          python -m unittest discover -s tests/contracts -p 'test_price_engine_route_inventory_proof.py' -v
          python -m unittest discover -s tests/contracts -p 'test_price_engine_route_inventory_proof_integrity.py' -v
          python -m unittest discover -s tests/contracts -p 'test_price_engine_contract_artifact_integrity.py' -v
          python -m unittest discover -s tests/contracts -p 'test_price_engine_frontend_entrypoint_integrity.py' -v
          python -m unittest discover -s tests/contracts -p 'test_price_engine_contracts_readme_integrity.py' -v
          python -m unittest discover -s tests/contracts -p 'test_price_engine_proof_gate_integrity.py' -v

      - name: Write proof gate summary
        shell: bash
        run: |
          {
            echo "PRICE ENGINE PROOF GATE"
            echo "- result: pass"
            echo "- route proofs: calculate, calculations-preview, title-rate-quote"
            echo "- governance proofs: calculate workflow integrity, calculations-preview workflow integrity, title-rate workflow integrity, route inventory, route-inventory workflow integrity, contract artifact integrity, frontend entrypoint integrity, contracts README integrity, proof gate integrity"
          } >> "$GITHUB_STEP_SUMMARY"
