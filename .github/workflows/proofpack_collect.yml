name: proofpack_collect

on:
  workflow_dispatch:
    inputs:
      artifact_glob:
        description: Optional extra glob to include
        required: false
        default: ""
        type: string
  workflow_run:
    workflows: ["autonomy_router"]
    types: [completed]

permissions:
  contents: read
  actions: read

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Collect proof artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _proofpack

          shopt -s globstar nullglob

          files=()
          for pattern in \
            "ci_proof.json" \
            "ci_proof.txt" \
            "**/ci_proof.json" \
            "**/ci_proof.txt" \
            "**/*curl*.txt" \
            "**/*sql*.txt" \
            "**/*diff_scope*.txt" \
            "**/*diff_scope*.patch" \
            "**/*raw_curl*" \
            "**/*raw_sql*" \
            "worker_packet.json" \
            "worker_packet.txt" \
            "worker_result.json" \
            "worker_result.txt" \
            "worker_handoff.txt" \
            "worker_execution_packet.json" \
            "worker_execution_packet.txt" \
            "worker_result_packet.json" \
            "worker_result_packet.txt" \
            "worker_final_handoff_packet.json" \
            "worker_final_handoff_packet.txt" \
            "backend_execution_packet_issue_*.json" \
            "backend_execution_packet_issue_*.txt" \
            "backend_result_packet_issue_*.json" \
            "backend_result_packet_issue_*.txt" \
            "backend_final_handoff_issue_*.json" \
            "backend_final_handoff_issue_*.txt" \
            "**/worker_packet.json" \
            "**/worker_packet.txt" \
            "**/worker_result.json" \
            "**/worker_result.txt" \
            "**/worker_handoff.txt" \
            "**/worker_execution_packet.json" \
            "**/worker_execution_packet.txt" \
            "**/worker_result_packet.json" \
            "**/worker_result_packet.txt" \
            "**/worker_final_handoff_packet.json" \
            "**/worker_final_handoff_packet.txt" \
            "**/backend_execution_packet_issue_*.json" \
            "**/backend_execution_packet_issue_*.txt" \
            "**/backend_result_packet_issue_*.json" \
            "**/backend_result_packet_issue_*.txt" \
            "**/backend_final_handoff_issue_*.json" \
            "**/backend_final_handoff_issue_*.txt"
          do
            for file in $pattern; do
              [ -f "$file" ] && files+=("$file")
            done
          done

          for file in docs/proofpacks/**/* worker_metrics_*.json worker_metrics_*.txt; do
            [ -f "$file" ] && files+=("$file")
          done

          extra="${{ inputs.artifact_glob }}"
          if [ -n "$extra" ]; then
            for file in $extra; do
              [ -f "$file" ] && files+=("$file")
            done
          fi

          {
            echo "proofpack_collect"
            echo "event=${{ github.event_name }}"
            echo "run_id=${{ github.run_id }}"
            echo "repository=${{ github.repository }}"
            echo "artifact_count=${#files[@]}"
            printf '%s\n' "${files[@]}"
          } > _proofpack/ci_proof.txt

          python - <<'PY'
          import json, os
          manifest = {
            "event_name": os.environ.get("GITHUB_EVENT_NAME"),
            "run_id": os.environ.get("GITHUB_RUN_ID"),
            "repository": os.environ.get("GITHUB_REPOSITORY"),
            "files": []
          }
          with open("_proofpack/ci_proof.txt", "r", encoding="utf-8") as f:
            for line in f.read().splitlines()[5:]:
              if line.strip():
                manifest["files"].append(line.strip())
          with open("_proofpack/ci_proof.json", "w", encoding="utf-8") as out:
            json.dump(manifest, out, indent=2)
          PY

          if [ ${#files[@]} -gt 0 ]; then
            cp --parents "${files[@]}" _proofpack/ || true
          fi

      - name: Upload proof artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: proofpack-${{ github.run_id }}
          path: _proofpack
          if-no-files-found: warn
