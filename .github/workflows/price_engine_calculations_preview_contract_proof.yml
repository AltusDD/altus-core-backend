name: price_engine_calculations_preview_contract_proof

on:
  pull_request:
    paths:
      - "tests/contracts/test_price_engine_calculations_preview_contract.py"
      - "docs/contracts/PRICE_ENGINE_CALCULATIONS_PREVIEW_CONTRACT_V1.md"
      - "docs/contracts/fixtures/price_engine_calculations_preview/**"
      - "azure/functions/asset_ingest/price_engine_calculations_preview_handler.py"
      - "azure/functions/asset_ingest/price_engine_calculations.py"
      - ".github/workflows/price_engine_calculations_preview_contract_proof.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  price-engine-calculations-preview-contract-proof:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run calculations preview contract proof
        shell: bash
        run: |
          set -euo pipefail
          python -m unittest discover -s tests/contracts -p 'test_price_engine_calculations_preview_contract.py' -v

      - name: Write contract proof summary
        shell: bash
        run: |
          {
            echo "PRICE ENGINE CALCULATIONS PREVIEW CONTRACT PROOF"
            echo "- test module: tests/contracts/test_price_engine_calculations_preview_contract.py"
            echo "- result: pass"
            echo "- scope: GET /api/price-engine/calculations-preview"
          } >> "$GITHUB_STEP_SUMMARY"
