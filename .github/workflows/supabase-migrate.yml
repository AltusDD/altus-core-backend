name: ALTUS-CORE — Supabase Migrations (Auto-Apply)

on:
  push:
    branches: [ "main" ]
    paths:
      - "supabase/migrations/**"
      - "supabase/policies/**"
      - ".github/workflows/supabase-migrate.yml"
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # IMPORTANT:
      # This requires a Supabase access token secret.
      # If your repo already has one working, keep its name.
      # Common name: SUPABASE_ACCESS_TOKEN
      - name: Login to Supabase
        run: supabase login --token "${{ secrets.SUPABASE_ACCESS_TOKEN }}"

      - name: Select target (staging/prod)
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="${{ inputs.target }}"
          else
            TARGET="staging"
          fi

          echo "TARGET=$TARGET" >> $GITHUB_OUTPUT

          if [ "$TARGET" = "prod" ]; then
            echo "PROJECT_REF=${{ secrets.SUPABASE_PROD_PROJECT_REF }}" >> $GITHUB_OUTPUT
            echo "DB_PASSWORD=${{ secrets.SUPABASE_PROD_DB_PASSWORD }}" >> $GITHUB_OUTPUT
          else
            echo "PROJECT_REF=${{ secrets.SUPABASE_STAGING_PROJECT_REF }}" >> $GITHUB_OUTPUT
            echo "DB_PASSWORD=${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}" >> $GITHUB_OUTPUT
          fi

      - name: Link project
        run: supabase link --project-ref "${{ steps.target.outputs.PROJECT_REF }}"

      - name: Apply migrations (db push)
        env:
          DB_PASSWORD: ${{ steps.target.outputs.DB_PASSWORD }}
        run: |
          set -euo pipefail
          ENCODED_PASSWORD="$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ['DB_PASSWORD']))")"
          # Use SESSION pooler (IPv4-friendly) — the CLI can use it reliably in Actions
          supabase db push \
            --db-url "postgresql://postgres.${{ steps.target.outputs.PROJECT_REF }}:${ENCODED_PASSWORD}@aws-0-us-west-2.pooler.supabase.com:5432/postgres"

      - name: Post-check (list tables)
        env:
          DB_PASSWORD: ${{ steps.target.outputs.DB_PASSWORD }}
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y postgresql-client
          export PGPASSWORD="$DB_PASSWORD"
          psql "host=aws-0-us-west-2.pooler.supabase.com dbname=postgres user=postgres.${{ steps.target.outputs.PROJECT_REF }} sslmode=require" \
            -c "select tablename from pg_tables where schemaname='public' order by tablename limit 50;"
