name: ALTUS-CORE — Supabase Migrations (Auto-Apply)

on:
  push:
    branches: [ "main" ]
    paths:
      - "supabase/migrations/**"
      - "supabase/policies/**"
      - ".github/workflows/supabase-migrate.yml"
  workflow_dispatch: {}

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1

      - name: Login
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase login --token "$SUPABASE_ACCESS_TOKEN"

      - name: Apply migrations (URL-safe password)
        env:
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail

          # URL encode password safely
          ENCODED_PASSWORD=$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ['DB_PASSWORD']))")

          supabase db push \
            --db-url "postgres://postgres.srzwamukysmhiaaviwiv:${ENCODED_PASSWORD}@aws-0-us-west-2.pooler.supabase.com:5432/postgres"
