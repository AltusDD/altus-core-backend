name: ALTUS-CORE — Supabase Migrations (Auto-Apply)

on:
  push:
    branches: [ "main" ]
    paths:
      - "supabase/migrations/**"
      - "supabase/policies/**"
      - ".github/workflows/supabase-migrate.yml"
  workflow_dispatch: {}

concurrency:
  group: supabase-migrate-main
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Login to Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase login --token "$SUPABASE_ACCESS_TOKEN"

      - name: Link project
        run: |
          supabase link --project-ref srzwamukysmhiaaviwiv

      - name: Apply migrations using pooler connection
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          supabase db push \
            --db-url "postgres://postgres.srzwamukysmhiaaviwiv:${SUPABASE_DB_PASSWORD}@aws-0-us-west-2.pooler.supabase.com:5432/postgres"
