name: price_engine_contract_artifact_integrity

on:
  pull_request:
    paths:
      - "tests/contracts/test_price_engine_contract_artifact_integrity.py"
      - "docs/contracts/PRICE_ENGINE_CONTRACT_COVERAGE_INDEX_V1.md"
      - "docs/contracts/PRICE_ENGINE_FRONTEND_ENTRYPOINT_V1.md"
      - "docs/contracts/PRICE_ENGINE_CALCULATE_CONTRACT_V1.md"
      - "docs/contracts/PRICE_ENGINE_CALCULATIONS_PREVIEW_CONTRACT_V1.md"
      - "docs/contracts/TITLE_RATE_PROVIDER_ADAPTER_CONTRACT_V1.md"
      - "docs/contracts/fixtures/price_engine_calculate/**"
      - "docs/contracts/fixtures/price_engine_calculations_preview/**"
      - "docs/contracts/fixtures/title_rate_quote/**"
      - "tests/contracts/test_price_engine_calculate_contract.py"
      - "tests/contracts/test_price_engine_calculations_preview_contract.py"
      - "tests/contracts/test_title_rate_quote_contract.py"
      - ".github/workflows/price_engine_contract_proof.yml"
      - ".github/workflows/price_engine_calculations_preview_contract_proof.yml"
      - ".github/workflows/title_rate_quote_contract_proof.yml"
      - ".github/workflows/price_engine_proof_gate.yml"
      - ".github/workflows/price_engine_contract_artifact_integrity.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  price-engine-contract-artifact-integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run price engine contract artifact integrity proof
        shell: bash
        run: |
          set -euo pipefail
          python -m unittest discover -s tests/contracts -p 'test_price_engine_contract_artifact_integrity.py' -v

      - name: Write artifact integrity summary
        shell: bash
        run: |
          {
            echo "PRICE ENGINE CONTRACT ARTIFACT INTEGRITY"
            echo "- test module: tests/contracts/test_price_engine_contract_artifact_integrity.py"
            echo "- result: pass"
            echo "- scope: coverage index and frontend entrypoint references must resolve to real proof artifacts, including the aggregate proof gate"
          } >> "$GITHUB_STEP_SUMMARY"
