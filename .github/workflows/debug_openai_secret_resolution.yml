name: debug_openai_secret_resolution

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug-secret-resolution:
    runs-on: ubuntu-latest
    env:
      SECRET_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SECRET_ALTUS_OPENAI_API_KEY: ${{ secrets.ALTUS_OPENAI_API_KEY }}
      SECRET_ORG_OPENAI_API_KEY: ${{ secrets.ORG_OPENAI_API_KEY }}
      SECRET_OPENAI_API_KEY_ALTUS: ${{ secrets.OPENAI_API_KEY_ALTUS }}
    steps:
      - name: Resolve secret presence safely
        id: resolve_secret
        shell: bash
        run: |
          set -euo pipefail

          mask_secret() {
            if [ -n "$1" ]; then
              echo "::add-mask::$1"
            fi
          }

          mask_secret "${SECRET_OPENAI_API_KEY:-}"
          mask_secret "${SECRET_ALTUS_OPENAI_API_KEY:-}"
          mask_secret "${SECRET_ORG_OPENAI_API_KEY:-}"
          mask_secret "${SECRET_OPENAI_API_KEY_ALTUS:-}"

          openai_api_key_present=false
          altus_openai_api_key_present=false
          org_openai_api_key_present=false
          openai_api_key_altus_present=false
          selected_secret_name=none
          selected_secret_present=false
          should_codex_worker_execute=false

          if [ -n "${SECRET_OPENAI_API_KEY:-}" ]; then
            openai_api_key_present=true
            selected_secret_name=OPENAI_API_KEY
            selected_secret_present=true
            should_codex_worker_execute=true
          fi

          if [ -n "${SECRET_ALTUS_OPENAI_API_KEY:-}" ]; then
            altus_openai_api_key_present=true
            if [ "$selected_secret_present" = false ]; then
              selected_secret_name=ALTUS_OPENAI_API_KEY
              selected_secret_present=true
              should_codex_worker_execute=true
            fi
          fi

          if [ -n "${SECRET_ORG_OPENAI_API_KEY:-}" ]; then
            org_openai_api_key_present=true
            if [ "$selected_secret_present" = false ]; then
              selected_secret_name=ORG_OPENAI_API_KEY
              selected_secret_present=true
              should_codex_worker_execute=true
            fi
          fi

          if [ -n "${SECRET_OPENAI_API_KEY_ALTUS:-}" ]; then
            openai_api_key_altus_present=true
            if [ "$selected_secret_present" = false ]; then
              selected_secret_name=OPENAI_API_KEY_ALTUS
              selected_secret_present=true
              should_codex_worker_execute=true
            fi
          fi

          {
            echo "openai_api_key_present=$openai_api_key_present"
            echo "altus_openai_api_key_present=$altus_openai_api_key_present"
            echo "org_openai_api_key_present=$org_openai_api_key_present"
            echo "openai_api_key_altus_present=$openai_api_key_altus_present"
            echo "selected_secret_name=$selected_secret_name"
            echo "selected_secret_present=$selected_secret_present"
            echo "should_codex_worker_execute=$should_codex_worker_execute"
          } >> "$GITHUB_OUTPUT"

          echo "OPENAI_API_KEY present=$openai_api_key_present"
          echo "ALTUS_OPENAI_API_KEY present=$altus_openai_api_key_present"
          echo "ORG_OPENAI_API_KEY present=$org_openai_api_key_present"
          echo "OPENAI_API_KEY_ALTUS present=$openai_api_key_altus_present"
          echo "selected_secret_name=$selected_secret_name"
          echo "selected_secret_present=$selected_secret_present"
          echo "should_codex_worker_execute=$should_codex_worker_execute"

      - name: Write debug summary
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "OPENAI SECRET RESOLUTION DEBUG"
            echo "- OPENAI_API_KEY: ${{ steps.resolve_secret.outputs.openai_api_key_present }}"
            echo "- ALTUS_OPENAI_API_KEY: ${{ steps.resolve_secret.outputs.altus_openai_api_key_present }}"
            echo "- ORG_OPENAI_API_KEY: ${{ steps.resolve_secret.outputs.org_openai_api_key_present }}"
            echo "- OPENAI_API_KEY_ALTUS: ${{ steps.resolve_secret.outputs.openai_api_key_altus_present }}"
            echo "- selected_secret_name: ${{ steps.resolve_secret.outputs.selected_secret_name }}"
            echo "- selected_secret_present: ${{ steps.resolve_secret.outputs.selected_secret_present }}"
            echo "- should_codex_worker_execute: ${{ steps.resolve_secret.outputs.should_codex_worker_execute }}"
          } >> "$GITHUB_STEP_SUMMARY"
